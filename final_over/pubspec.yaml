name: final_over
description: "Final Over - a clean-room, offline six-ball cricket chase."
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  audioplayers: ^6.7.1
  flame: ^1.37.0
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.5

dev_dependencies:
  fake_async: ^1.3.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/backgrounds/
  fonts:
    - family: FinalOverCondensed
      fonts:
        - asset: assets/fonts/FinalOverCondensed-Regular.ttf
          weight: 400
        - asset: assets/fonts/FinalOverCondensed-Bold.ttf
          weight: 700
